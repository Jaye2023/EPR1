<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报价单管理 - 报价系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/sidebar.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }
    .status-draft { background-color: #6c757d; color: white; }
    .status-confirmed { background-color: #007bff; color: white; }
    .status-sent { background-color: #17a2b8; color: white; }
    .status-expired { background-color: #dc3545; color: white; }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">
      <i class="bi bi-chevron-left" id="toggleIcon"></i>
    </button>
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="bi bi-calculator"></i></div>
      <div class="sidebar-title">报价系统</div>
      <div class="sidebar-subtitle">Baojia System</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">主菜单</div>
      <a class="nav-link" href="/" title="仪表盘"><i class="bi bi-speedometer2"></i><span>仪表盘</span></a>
      <a class="nav-link" href="/products" title="产品管理"><i class="bi bi-box-seam"></i><span>产品管理</span></a>
      <a class="nav-link active" href="/quotes" title="报价单管理"><i class="bi bi-file-earmark-text"></i><span>报价单管理</span></a>
      <a class="nav-link" href="/customers" title="客户管理"><i class="bi bi-people"></i><span>客户管理</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">基础数据</div>
      <a class="nav-link" href="/wire-specs" title="电线规格"><i class="bi bi-diagram-3"></i><span>电线规格</span></a>
      <a class="nav-link" href="/plugs" title="插头价格"><i class="bi bi-plug"></i><span>插头价格</span></a>
      <a class="nav-link" href="/tail-processings" title="尾部处理"><i class="bi bi-scissors"></i><span>尾部处理</span></a>
      <a class="nav-link" href="/process-cards" title="料号"><i class="bi bi-file-image"></i><span>料号</span></a>
      <a class="nav-link" href="/customer-item-numbers" title="客户料号"><i class="bi bi-tag"></i><span>客户料号</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">系统</div>
      <a class="nav-link" href="/salespersons" title="报价人管理"><i class="bi bi-person-badge"></i><span>报价人管理</span></a>
      <a class="nav-link" href="/settings" title="系统设置"><i class="bi bi-gear"></i><span>系统设置</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar"><i class="bi bi-person"></i></div>
        <div>
          <div class="user-name" id="sidebarUserName">管理员</div>
          <div class="user-role" id="sidebarUserRole">系统管理</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="p-4">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb bg-white px-4 py-2 rounded-lg shadow-sm">
          <li class="breadcrumb-item"><a href="/">首页</a></li>
          <li class="breadcrumb-item active" aria-current="page">报价单管理</li>
        </ol>
      </nav>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">报价单管理</h2>
        <div class="d-flex gap-2">
          <a href="/quotes/new" class="btn btn-primary shadow-sm"><i class="bi bi-plus-circle me-2"></i>新建报价单</a>
          <button class="btn btn-outline-primary shadow-sm" onclick="exportQuotes()"><i class="bi bi-download me-2"></i>导出Excel</button>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-white border-bottom-0">
          <div class="row align-items-center">
            <div class="col-md-4">
              <div class="position-relative">
                <i class="bi bi-search search-icon text-muted"></i>
                <input type="text" class="form-control rounded-lg border border-gray-300 pl-10" id="searchInput" placeholder="搜索报价单号或客户名称..." onkeyup="if(event.key === 'Enter') loadQuotes()">
              </div>
            </div>
            <div class="col-md-3">
              <select class="form-select rounded-lg border border-gray-300" id="statusFilter" onchange="loadQuotes()">
                <option value="">全部状态</option>
                <option value="draft">草稿</option>
                <option value="confirmed">已确认</option>
                <option value="sent">已发送</option>
                <option value="expired">已过期</option>
              </select>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="bg-gray-50">
                <tr>
                  <th class="py-3 px-4">报价单号</th>
                  <th class="py-3 px-4">客户名称</th>
                  <th class="py-3 px-4">报价日期</th>
                  <th class="py-3 px-4">有效期至</th>
                  <th class="py-3 px-4">总金额</th>
                  <th class="py-3 px-4">币种</th>
                  <th class="py-3 px-4">状态</th>
                  <th class="py-3 px-4">操作</th>
                </tr>
              </thead>
              <tbody id="quotesTable"></tbody>
            </table>
          </div>
        </div>
        <div class="card-footer bg-white border-top d-flex justify-content-between align-items-center">
          <span id="paginationInfo">共 0 条记录</span>
          <nav id="pagination"></nav>
        </div>
      </div>

      <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">确认删除</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <p>确定要删除这个报价单吗？此操作无法撤销。</p>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
              <button type="button" class="btn btn-danger" id="confirmDelete">删除</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let deleteModal = null;
    let deleteId = null;

    function getAuthHeaders() { return Auth.getHeaders(); }

    async function loadQuotes(page = 1) {
      const searchTerm = document.getElementById('searchInput').value;
      const status = document.getElementById('statusFilter').value;
      try {
        const response = await fetch(`/api/quotes?page=${page}&search=${encodeURIComponent(searchTerm)}&status=${status}`, { headers: getAuthHeaders() });
        if (response.ok) {
          const data = await response.json();
          renderQuotes(data.quotes);
          renderPagination(data.page, data.totalPages, data.total);
        }
      } catch (error) { console.error('Failed to load quotes:', error); }
    }

    function renderQuotes(quotes) {
      const tbody = document.getElementById('quotesTable');
      if (!quotes || quotes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-muted">暂无报价单数据</td></tr>';
        return;
      }
      tbody.innerHTML = quotes.map(q => `
        <tr>
          <td class="py-3 px-4">${q.quoteNumber}</td>
          <td class="py-3 px-4">${q.customerName || '-'}</td>
          <td class="py-3 px-4">${formatDate(q.quoteDate)}</td>
          <td class="py-3 px-4">${formatDate(q.validUntil)}</td>
          <td class="py-3 px-4">${q.totalAmount ? q.totalAmount.toFixed(2) : '-'}</td>
          <td class="py-3 px-4">${q.currency || 'RMB'}</td>
          <td class="py-3 px-4"><span class="badge status-${q.status}">${getStatusText(q.status)}</span></td>
          <td class="py-3 px-4">
            <a href="/quotes/${q.id}" class="btn btn-sm btn-primary me-1" title="详情"><i class="bi bi-eye"></i></a>
            <a href="/quotes/${q.id}/edit" class="btn btn-sm btn-outline-primary me-1" title="编辑"><i class="bi bi-pencil"></i></a>
            <button class="btn btn-sm btn-outline-secondary me-1" onclick="duplicateQuote(${q.id})" title="复制"><i class="bi bi-copy"></i></button>
            <button class="btn btn-sm btn-danger" onclick="showDeleteModal(${q.id})" title="删除"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    function getStatusText(status) {
      const texts = { draft: '草稿', confirmed: '已确认', sent: '已发送', expired: '已过期' };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN');
    }

    function renderPagination(current, totalPages, total) {
      document.getElementById('paginationInfo').textContent = `共 ${total} 条记录，第 ${current} / ${totalPages} 页`;
      let html = '<ul class="pagination mb-0">';
      if (totalPages > 1) {
        html += `<li class="page-item ${current === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadQuotes(${current - 1})">上一页</a></li>`;
        for (let i = 1; i <= totalPages; i++) {
          html += `<li class="page-item ${current === i ? 'active' : ''}"><a class="page-link" href="#" onclick="loadQuotes(${i})">${i}</a></li>`;
        }
        html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadQuotes(${current + 1})">下一页</a></li>`;
      }
      html += '</ul>';
      document.getElementById('pagination').innerHTML = html;
    }

    function showDeleteModal(id) {
      deleteId = id;
      deleteModal.show();
    }

    async function handleDelete() {
      if (!deleteId) return;
      try {
        const response = await fetch(`/api/quotes/${deleteId}`, { method: 'DELETE', headers: getAuthHeaders() });
        if (response.ok) { deleteModal.hide(); loadQuotes(); }
      } catch (error) { console.error('Failed to delete quote:', error); }
    }

    async function duplicateQuote(id) {
      try {
        const response = await fetch(`/api/quotes/${id}/duplicate`, { method: 'POST', headers: getAuthHeaders() });
        if (response.ok) {
          const data = await response.json();
          window.location.href = `/quotes/${data.id}/edit`;
        }
      } catch (error) { console.error('Failed to duplicate quote:', error); }
    }

    async function exportQuotes() {
      try {
        const response = await fetch('/api/quotes/export', { headers: getAuthHeaders() });
        if (response.ok) {
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `报价单列表_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.xlsx`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a); window.URL.revokeObjectURL(url);
        }
      } catch (error) { console.error('Failed to export quotes:', error); }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      sidebar.classList.toggle('collapsed');
      mainContent.classList.toggle('expanded');
      if (sidebar.classList.contains('collapsed')) {
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
        sessionStorage.setItem('sidebarCollapsed', 'true');
      } else {
        icon.classList.remove('bi-chevron-right');
        icon.classList.add('bi-chevron-left');
        sessionStorage.setItem('sidebarCollapsed', 'false');
      }
    }

    function initSidebarState() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      if (sessionStorage.getItem('sidebarCollapsed') === 'true') {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const authenticated = await Auth.init();
      if (!authenticated) return;
      deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
      document.getElementById('confirmDelete').addEventListener('click', handleDelete);
      initSidebarState();
      loadQuotes();
    });
  </script>
</body>
</html>
