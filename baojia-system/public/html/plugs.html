<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插头价格 - 报价系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/sidebar.css">
  <style>
    body { background-color: #f8f9fa; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">
      <i class="bi bi-chevron-left" id="toggleIcon"></i>
    </button>
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="bi bi-calculator"></i></div>
      <div class="sidebar-title">报价系统</div>
      <div class="sidebar-subtitle">Baojia System</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">主菜单</div>
      <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i><span>仪表盘</span></a>
      <a class="nav-link" href="/products"><i class="bi bi-box-seam"></i><span>产品管理</span></a>
      <a class="nav-link" href="/quotes"><i class="bi bi-file-earmark-text"></i><span>报价单管理</span></a>
      <a class="nav-link" href="/customers"><i class="bi bi-people"></i><span>客户管理</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">基础数据</div>
      <a class="nav-link" href="/wire-specs"><i class="bi bi-diagram-3"></i><span>电线规格</span></a>
      <a class="nav-link active" href="/plugs"><i class="bi bi-plug"></i><span>插头价格</span></a>
      <a class="nav-link" href="/tail-processings"><i class="bi bi-scissors"></i><span>尾部处理</span></a>
      <a class="nav-link" href="/process-cards"><i class="bi bi-file-image"></i><span>料号</span></a>
      <a class="nav-link" href="/customer-item-numbers"><i class="bi bi-tag"></i><span>客户料号</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">系统</div>
      <a class="nav-link" href="/salespersons"><i class="bi bi-person-badge"></i><span>报价人管理</span></a>
      <a class="nav-link" href="/settings"><i class="bi bi-gear"></i><span>系统设置</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar"><i class="bi bi-person"></i></div>
        <div>
          <div class="user-name" id="sidebarUserName">管理员</div>
          <div class="user-role" id="sidebarUserRole">系统管理</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="p-4">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb bg-white px-4 py-2 rounded-lg shadow-sm">
          <li class="breadcrumb-item"><a href="/">首页</a></li>
          <li class="breadcrumb-item active">插头价格</li>
        </ol>
      </nav>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">插头价格管理</h2>
        <div class="d-flex gap-2">
          <button class="btn btn-success" onclick="exportPlugs()"><i class="bi bi-download me-2"></i>导出</button>
          <button class="btn btn-info" onclick="showImportModal()"><i class="bi bi-upload me-2"></i>导入</button>
          <button class="btn btn-primary" onclick="showAddModal()"><i class="bi bi-plus-circle me-2"></i>添加插头</button>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <div class="position-relative col-md-4">
            <i class="bi bi-search search-icon text-muted"></i>
            <input type="text" class="form-control pl-10" id="searchInput" placeholder="搜索插头型号..." onkeyup="if(event.key === 'Enter') loadPlugs()">
          </div>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover">
            <thead class="bg-gray-50">
              <tr>
                <th>型号</th>
                <th>规格描述</th>
                <th>单价</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="plugsTable"></tbody>
          </table>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between">
          <span id="paginationInfo">共 0 条记录</span>
          <nav id="pagination"></nav>
        </div>
      </div>

      <div class="modal fade" id="usageModal">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">关联数据</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="mb-4">
                <h6 class="text-primary"><i class="bi bi-file-image me-2"></i>关联料号</h6>
                <div id="processCardList" class="text-muted">暂无关联料号</div>
              </div>
              <div>
                <h6 class="text-primary"><i class="bi bi-box-seam me-2"></i>关联产品</h6>
                <div id="productList" class="text-muted">暂无关联产品</div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="importModal">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">导入插头数据</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label>选择Excel文件 <span class="text-danger">*</span></label>
                <input type="file" class="form-control" id="importFile" accept=".xlsx,.xls">
              </div>
              <div class="mb-3">
                <label>导入模式</label>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="importMode" id="importModeAdd" value="add" checked>
                  <label class="form-check-label" for="importModeAdd">仅新增（跳过已存在的型号）</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="importMode" id="importModeUpdate" value="update">
                  <label class="form-check-label" for="importModeUpdate">更新模式（更新已存在的型号价格）</label>
                </div>
              </div>
              <div class="alert alert-info">
                <strong>导入格式要求：</strong><br>
                第一行为表头，包含：插头名称、单价、币种(可选)、描述(可选)<br>
                <a href="#" onclick="downloadImportTemplate()" class="text-primary">下载导入模板</a>
              </div>
              <div id="importPreview" class="mt-4" style="display: none;">
                <h6 class="text-primary">数据预览（前5条）</h6>
                <table class="table table-sm table-bordered mt-2">
                  <thead>
                    <tr>
                      <th>插头名称</th>
                      <th>单价</th>
                      <th>币种</th>
                      <th>描述</th>
                      <th>状态</th>
                    </tr>
                  </thead>
                  <tbody id="importPreviewBody"></tbody>
                </table>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
              <button type="button" class="btn btn-outline-secondary" onclick="previewImport()">预览数据</button>
              <button type="button" class="btn btn-primary" onclick="importPlugs()">开始导入</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="plugModal">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="modalTitle">添加插头</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="plugId">
              <div class="mb-3">
                <label>型号 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="model" required placeholder="如: A-001">
              </div>
              <div class="mb-3">
                <label>规格描述 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="description" required placeholder="插头规格说明">
              </div>
              <div class="mb-3">
                <label>单价 <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="price" required step="0.01" min="0" placeholder="请输入单价">
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
              <button type="button" class="btn btn-primary" onclick="savePlug()">保存</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let modal = null;

    function getAuthHeaders() { return Auth.getHeaders(); }

    async function loadPlugs(page = 1) {
      const search = document.getElementById('searchInput').value;
      const res = await fetch(`/api/plugs?page=${page}&search=${encodeURIComponent(search)}`, { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        renderPlugs(data.plugs);
        renderPagination(data.page, data.totalPages, data.total);
      }
    }

    function renderPlugs(items) {
      const tbody = document.getElementById('plugsTable');
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8">暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(item => `
        <tr>
          <td>${item.name}</td>
          <td>${item.description || '-'}</td>
          <td>¥${item.price.toFixed(2)}</td>
          <td>
            <button class="btn btn-sm btn-info me-1" onclick="showUsage(${item.id})" title="查看关联数据"><i class="bi bi-link-45deg"></i></button>
            <button class="btn btn-sm btn-primary me-1" onclick="editPlug(${item.id})" title="编辑"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deletePlug(${item.id}, '${item.name}')" title="删除"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    function renderPagination(current, totalPages, total) {
      document.getElementById('paginationInfo').textContent = `共 ${total} 条记录`;
      let html = '<ul class="pagination mb-0">';
      if (totalPages > 1) {
        html += `<li class="page-item ${current === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadPlugs(${current - 1})">上一页</a></li>`;
        for (let i = 1; i <= totalPages; i++) {
          html += `<li class="page-item ${current === i ? 'active' : ''}"><a class="page-link" href="#" onclick="loadPlugs(${i})">${i}</a></li>`;
        }
        html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadPlugs(${current + 1})">下一页</a></li>`;
      }
      html += '</ul>';
      document.getElementById('pagination').innerHTML = html;
    }

    let importModal = null;

    function showImportModal() {
      document.getElementById('importFile').value = '';
      importModal.show();
    }

    async function exportPlugs() {
      try {
        const response = await fetch('/api/plugs/export', { headers: getAuthHeaders() });
        if (response.ok) {
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `插头价格_${new Date().toISOString().slice(0, 10)}.xlsx`;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);
        } else {
          const error = await response.json();
          alert('导出失败: ' + error.error);
        }
      } catch (error) {
        console.error('Export error:', error);
        alert('导出失败，请检查网络连接');
      }
    }

    async function importPlugs() {
      const file = document.getElementById('importFile').files[0];
      if (!file) {
        alert('请选择要导入的Excel文件');
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('/api/plugs/import', {
          method: 'POST',
          headers: getAuthHeaders(),
          body: formData
        });

        if (response.ok) {
          const result = await response.json();
          alert(result.message);
          importModal.hide();
          loadPlugs();
        } else {
          const error = await response.json();
          alert('导入失败: ' + error.error);
        }
      } catch (error) {
        console.error('Import error:', error);
        alert('导入失败，请检查网络连接');
      }
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = '添加插头';
      document.getElementById('plugId').value = '';
      document.getElementById('model').value = '';
      document.getElementById('description').value = '';
      document.getElementById('price').value = '';
      modal.show();
    }

    async function editPlug(id) {
      const res = await fetch(`/api/plugs/${id}`, { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        const item = data.plug || data;
        document.getElementById('modalTitle').textContent = '编辑插头';
        document.getElementById('plugId').value = item.id;
        document.getElementById('model').value = item.name;
        document.getElementById('description').value = item.description || '';
        document.getElementById('price').value = item.price;
        modal.show();
      }
    }

    async function savePlug() {
      const id = document.getElementById('plugId').value;
      const name = document.getElementById('model').value;
      const description = document.getElementById('description').value;
      const price = parseFloat(document.getElementById('price').value);
      if (!name || isNaN(price)) {
        alert('请填写插头名称和单价');
        return;
      }
      const data = {
        name: name,
        description: description || '',
        price: price
      };
      const url = id ? `/api/plugs/${id}` : '/api/plugs';
      const method = id ? 'PUT' : 'POST';
      try {
        const res = await fetch(url, {
          method, headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          modal.hide();
          loadPlugs();
        } else {
          const error = await res.json();
          alert('保存失败: ' + error.error);
        }
      } catch (error) {
        console.error('Save plug error:', error);
        alert('保存失败，请检查网络连接或重新登录');
      }
    }

    async function deletePlug(id, model) {
      const usageRes = await fetch(`/api/plugs/${id}/usage`, { headers: getAuthHeaders() });
      if (usageRes.ok) {
        const usage = await usageRes.json();
        if (usage.processCards.length > 0 || usage.products.length > 0) {
          alert(`无法删除，该插头已被 ${usage.processCards.length} 个料号和 ${usage.products.length} 个产品使用`);
          return;
        }
      }
      if (!confirm(`确定删除插头 "${model}" 吗？`)) return;
      const res = await fetch(`/api/plugs/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
      if (res.ok) loadPlugs();
    }

    let usageModal = null;

    async function showUsage(id) {
      const res = await fetch(`/api/plugs/${id}/usage`, { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        
        const processCardList = document.getElementById('processCardList');
        const productList = document.getElementById('productList');
        
        if (data.processCards && data.processCards.length > 0) {
          processCardList.innerHTML = `
            <ul class="list-group">
              ${data.processCards.map(card => `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                  <span>${card.itemNumber}</span>
                  <span class="text-muted text-sm">${card.name || '-'}</span>
                </li>
              `).join('')}
            </ul>
          `;
        } else {
          processCardList.textContent = '暂无关联料号';
        }
        
        if (data.products && data.products.length > 0) {
          productList.innerHTML = `
            <ul class="list-group">
              ${data.products.map(product => `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                  <span>${product.productNo || '-'}</span>
                  <span class="text-muted text-sm">${product.name || '-'}</span>
                </li>
              `).join('')}
            </ul>
          `;
        } else {
          produ
