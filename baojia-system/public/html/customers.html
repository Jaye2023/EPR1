<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户管理 - 报价系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/sidebar.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">
      <i class="bi bi-chevron-left" id="toggleIcon"></i>
    </button>
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="bi bi-calculator"></i></div>
      <div class="sidebar-title">报价系统</div>
      <div class="sidebar-subtitle">Baojia System</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">主菜单</div>
      <a class="nav-link" href="/" title="仪表盘"><i class="bi bi-speedometer2"></i><span>仪表盘</span></a>
      <a class="nav-link" href="/products" title="产品管理"><i class="bi bi-box-seam"></i><span>产品管理</span></a>
      <a class="nav-link" href="/quotes" title="报价单管理"><i class="bi bi-file-earmark-text"></i><span>报价单管理</span></a>
      <a class="nav-link active" href="/customers" title="客户管理"><i class="bi bi-people"></i><span>客户管理</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">基础数据</div>
      <a class="nav-link" href="/wire-specs" title="电线规格"><i class="bi bi-diagram-3"></i><span>电线规格</span></a>
      <a class="nav-link" href="/plugs" title="插头价格"><i class="bi bi-plug"></i><span>插头价格</span></a>
      <a class="nav-link" href="/tail-processings" title="尾部处理"><i class="bi bi-scissors"></i><span>尾部处理</span></a>
      <a class="nav-link" href="/process-cards" title="料号"><i class="bi bi-file-image"></i><span>料号</span></a>
      <a class="nav-link" href="/customer-item-numbers" title="客户料号"><i class="bi bi-tag"></i><span>客户料号</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">系统</div>
      <a class="nav-link" href="/salespersons" title="报价人管理"><i class="bi bi-person-badge"></i><span>报价人管理</span></a>
      <a class="nav-link" href="/settings" title="系统设置"><i class="bi bi-gear"></i><span>系统设置</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar"><i class="bi bi-person"></i></div>
        <div>
          <div class="user-name" id="sidebarUserName">管理员</div>
          <div class="user-role" id="sidebarUserRole">系统管理</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="p-4">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb bg-white px-4 py-2 rounded-lg shadow-sm">
          <li class="breadcrumb-item"><a href="/">首页</a></li>
          <li class="breadcrumb-item active" aria-current="page">客户管理</li>
        </ol>
      </nav>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">客户管理</h2>
        <button class="btn btn-primary shadow-sm" onclick="showAddModal()"><i class="bi bi-plus-circle me-2"></i>添加客户</button>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-white border-bottom-0">
          <div class="position-relative col-md-4">
            <i class="bi bi-search search-icon text-muted"></i>
            <input type="text" class="form-control rounded-lg border border-gray-300 pl-10" id="searchInput" placeholder="搜索客户名称或编号..." onkeyup="if(event.key === 'Enter') loadCustomers()">
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="bg-gray-50">
                <tr>
                  <th class="py-3 px-4">客户编号</th>
                  <th class="py-3 px-4">客户名称</th>
                  <th class="py-3 px-4">联系人</th>
                  <th class="py-3 px-4">联系电话</th>
                  <th class="py-3 px-4">邮箱</th>
                  <th class="py-3 px-4">地址</th>
                  <th class="py-3 px-4">操作</th>
                </tr>
              </thead>
              <tbody id="customersTable"></tbody>
            </table>
          </div>
        </div>
        <div class="card-footer bg-white border-top d-flex justify-content-between align-items-center">
          <span id="paginationInfo">共 0 条记录</span>
          <nav id="pagination"></nav>
        </div>
      </div>

      <div class="modal fade" id="customerModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="modalTitle">添加客户</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="customerId">
              <div class="mb-3">
                <label class="form-label">客户编号</label>
                <input type="text" class="form-control" id="customerNo">
              </div>
              <div class="mb-3">
                <label class="form-label">客户名称 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="customerName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">联系人</label>
                <input type="text" class="form-control" id="contactPerson">
              </div>
              <div class="mb-3">
                <label class="form-label">联系电话</label>
                <input type="text" class="form-control" id="phone">
              </div>
              <div class="mb-3">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email">
              </div>
              <div class="mb-3">
                <label class="form-label">地址</label>
                <textarea class="form-control" id="address" rows="2"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
              <button type="button" class="btn btn-primary" onclick="saveCustomer()">保存</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let modal = null;

    function getAuthHeaders() { return Auth.getHeaders(); }

    async function loadCustomers(page = 1) {
      const searchTerm = document.getElementById('searchInput').value;
      try {
        const response = await fetch(`/api/customers?page=${page}&search=${encodeURIComponent(searchTerm)}`, { headers: getAuthHeaders() });
        if (response.ok) {
          const data = await response.json();
          renderCustomers(data.customers);
          renderPagination(data.page, data.totalPages, data.total);
        }
      } catch (error) { console.error('Failed to load customers:', error); }
    }

    function renderCustomers(customers) {
      const tbody = document.getElementById('customersTable');
      if (!customers || customers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-muted">暂无客户数据</td></tr>';
        return;
      }
      tbody.innerHTML = customers.map(c => `
        <tr>
          <td class="py-3 px-4">${c.customerNo || '-'}</td>
          <td class="py-3 px-4">${c.name}</td>
          <td class="py-3 px-4">${c.contactPerson || '-'}</td>
          <td class="py-3 px-4">${c.phone || '-'}</td>
          <td class="py-3 px-4">${c.email || '-'}</td>
          <td class="py-3 px-4">${c.address || '-'}</td>
          <td class="py-3 px-4">
            <button class="btn btn-sm btn-primary me-1" onclick="editCustomer(${c.id})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id}, '${c.name}')"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    function renderPagination(current, totalPages, total) {
      document.getElementById('paginationInfo').textContent = `共 ${total} 条记录，第 ${current} / ${totalPages} 页`;
      let html = '<ul class="pagination mb-0">';
      if (totalPages > 1) {
        html += `<li class="page-item ${current === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadCustomers(${current - 1})">上一页</a></li>`;
        for (let i = 1; i <= totalPages; i++) {
          html += `<li class="page-item ${current === i ? 'active' : ''}"><a class="page-link" href="#" onclick="loadCustomers(${i})">${i}</a></li>`;
        }
        html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadCustomers(${current + 1})">下一页</a></li>`;
      }
      html += '</ul>';
      document.getElementById('pagination').innerHTML = html;
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = '添加客户';
      document.getElementById('customerId').value = '';
      document.getElementById('customerNo').value = '';
      document.getElementById('customerName').value = '';
      document.getElementById('contactPerson').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('address').value = '';
      modal.show();
    }

    async function editCustomer(id) {
      try {
        const response = await fetch(`/api/customers/${id}`, { headers: getAuthHeaders() });
        if (response.ok) {
          const c = await response.json();
          document.getElementById('modalTitle').textContent = '编辑客户';
          document.getElementById('customerId').value = c.id;
          document.getElementById('customerNo').value = c.customerNo || '';
          document.getElementById('customerName').value = c.name;
          document.getElementById('contactPerson').value = c.contactPerson || '';
          document.getElementById('phone').value = c.phone || '';
          document.getElementById('email').value = c.email || '';
          document.getElementById('address').value = c.address || '';
          modal.show();
        }
      } catch (error) { console.error('Failed to load customer:', error); }
    }

    async function saveCustomer() {
      const id = document.getElementById('customerId').value;
      const data = {
        customerNo: document.getElementById('customerNo').value,
        name: document.getElementById('customerName').value,
        contactPerson: document.getElementById('contactPerson').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        address: document.getElementById('address').value
      };
      if (!data.name) { alert('请输入客户名称'); return; }
      try {
        const url = id ? `/api/customers/${id}` : '/api/customers';
        const method = id ? 'PUT' : 'POST';
        const response = await fetch(url, {
          method, headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
          body: JSON.stringify(data)
        });
        if (response.ok) { modal.hide(); loadCustomers(); }
      } catch (error) { console.error('Failed to save customer:', error); }
    }

    async function deleteCustomer(id, name) {
      if (!confirm(`确定要删除客户 "${name}" 吗？`)) return;
      try {
        const response = await fetch(`/api/customers/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
        if (response.ok) loadCustomers();
      } catch (error) { console.error('Failed to delete customer:', error); }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      sidebar.classList.toggle('collapsed');
      mainContent.classList.toggle('expanded');
      if (sidebar.classList.contains('collapsed')) {
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
        sessionStorage.setItem('sidebarCollapsed', 'true');
      } else {
        icon.classList.remove('bi-chevron-right');
        icon.classList.add('bi-chevron-left');
        sessionStorage.setItem('sidebarCollapsed', 'false');
      }
    }

    function initSidebarState() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      if (sessionStorage.getItem('sidebarCollapsed') === 'true') {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const authenticated = await Auth.init();
      if (!authenticated) return;
      modal = new bootstrap.Modal(document.getElementById('customerModal'));
      initSidebarState();
      loadCustomers();
    });
  </script>
</body>
</html>
