<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尾部处理价格维护 - 报价系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f8f9fa;
    }.table { margin-bottom: 0; }
    .table th { border-top: none; font-weight: 600; color: #6c757d; font-size: 0.85rem; text-transform: uppercase; }
    .table td { vertical-align: middle; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">
      <i class="bi bi-chevron-left" id="toggleIcon"></i>
    </button>

    <div class="sidebar-header">
      <div class="sidebar-logo">
        <i class="bi bi-calculator"></i>
      </div>
      <div class="sidebar-title">报价系统</div>
      <div class="sidebar-subtitle">Baojia System</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">主菜单</div>
      <a class="nav-link" href="/" title="仪表盘">
        <i class="bi bi-speedometer2"></i>
        <span>仪表盘</span>
      </a>
      <a class="nav-link" href="/products" title="产品管理">
        <i class="bi bi-box-seam"></i>
        <span>产品管理</span>
      </a>
      <a class="nav-link" href="/quotes" title="报价单管理">
        <i class="bi bi-file-earmark-text"></i>
        <span>报价单管理</span> 
      </a>
      <a class="nav-link" href="/customers" title="客户管理">
        <i class="bi bi-people"></i>
        <span>客户管理</span>
      </a>

      <div class="nav-divider"></div>
      <div class="nav-section-title">基础数据</div>

      <a class="nav-link" href="/wire-specs" title="电线规格">
        <i class="bi bi-diagram-3"></i>
        <span>电线规格</span>
      </a>
      <a class="nav-link" href="/plugs" title="插头价格">
        <i class="bi bi-plug"></i>
        <span>插头价格</span>
      </a>
      <a class="nav-link active" href="/tail-processings" title="尾部处理">
        <i class="bi bi-scissors"></i>
        <span>尾部处理</span>
      </a>
      <a class="nav-link" href="/process-cards" title="料号">
        <i class="bi bi-file-image"></i>
        <span>料号</span>
      </a>
      <a class="nav-link" href="/customer-item-numbers" title="客户料号">
        <i class="bi bi-tag"></i>
        <span>客户料号</span>
      </a>

      <div class="nav-divider"></div>
      <div class="nav-section-title">系统</div>

      <a class="nav-link" href="/salespersons" title="报价人管理">
        <i class="bi bi-person-badge"></i>
        <span>报价人管理</span>
      </a>
      <a class="nav-link" href="/settings" title="系统设置">
        <i class="bi bi-gear"></i>
        <span>系统设置</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          <i class="bi bi-person"></i>
        </div>
        <div>
          <div class="user-name" id="sidebarUserName">管理员</div>
          <div class="user-role" id="sidebarUserRole">系统管理</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="container-fluid p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        
  <nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/" class="text-primary text-decoration-none">首页</a></li><li class="breadcrumb-item"><a href="/tail-processings" class="text-primary text-decoration-none">尾部处理</a></li>
    </ol>
  </nav>
        <h2><i class="bi bi-scissors me-2"></i>尾部处理价格维护</h2>
        <div class="d-flex gap-3">
          <div class="input-group" style="width: 250px;">
            <input type="text" class="form-control" id="searchInput" placeholder="搜索处理名称..." oninput="filterTailProcessings()">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
          </div>
          <button type="button" class="btn btn-primary" onclick="showAddModal()">
            <i class="bi bi-plus-circle me-2"></i>添加尾部处理
          </button>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>序号</th>
                  <th>处理名称</th>
                  <th>单价 (元)</th>
                  <th>币种</th>
                  <th>描述</th>
                  <th>更新时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="tailProcessingsTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="tailProcessingModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">添加尾部处理</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="tailProcessingForm">
            <input type="hidden" id="tailProcessingId">
            <div class="mb-3">
              <label class="form-label">处理名称 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="tailProcessingName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">单价 (元) <span class="text-danger">*</span></label>
              <input type="number" step="0.01" class="form-control" id="tailProcessingPrice" required>
            </div>
            <div class="mb-3">
              <label class="form-label">币种</label>
              <select class="form-select" id="tailProcessingCurrency">
                <option value="RMB">RMB (人民币)</option>
                <option value="USD">USD (美元)</option>
                <option value="EUR">EUR (欧元)</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">描述</label>
              <textarea class="form-control" id="tailProcessingDescription" rows="2"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveTailProcessing()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/tabs.js"></script>
  <script>
    let tailProcessings = [];
    let tailProcessingModal = null;

    function getAuthHeaders() {
      return Auth.getHeaders();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const toggleIcon = document.getElementById('toggleIcon');
      sidebar.classList.toggle('collapsed');
      mainContent.classList.toggle('expanded');
      toggleIcon.classList.toggle('bi-chevron-left');
      toggleIcon.classList.toggle('bi-chevron-right');
      
      if (sidebar.classList.contains('collapsed')) {
        sessionStorage.setItem('sidebarCollapsed', 'true');
      } else {
        sessionStorage.setItem('sidebarCollapsed', 'false');
      }
    }

    function initSidebarState() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      const isCollapsed = sessionStorage.getItem('sidebarCollapsed') === 'true';

      if (isCollapsed) {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const authenticated = await Auth.init();
      if (!authenticated) return;
      
      tailProcessingModal = new bootstrap.Modal(document.getElementById('tailProcessingModal'));
      loadTailProcessings();
      restoreModalState();
      initSidebarState();

      document.getElementById('tailProcessingModal').addEventListener('hidden.bs.modal', () => {
        sessionStorage.removeItem('tailProcessingModalState');
      });
    });

    window.addEventListener('beforeunload', saveModalState);

    function saveModalState() {
      if (document.getElementById('tailProcessingModal').classList.contains('show')) {
        const state = {
          modal: 'tailProcessing',
          id: document.getElementById('tailProcessingId').value,
          name: document.getElementById('tailProcessingName').value,
          price: document.getElementById('tailProcessingPrice').value,
          currency: document.getElementById('tailProcessingCurrency').value,
          description: document.getElementById('tailProcessingDescription').value
        };
        sessionStorage.setItem('tailProcessingModalState', JSON.stringify(state));
      }
    }

    function restoreModalState() {
      const savedState = sessionStorage.getItem('tailProcessingModalState');
      if (!savedState) return;

      const state = JSON.parse(savedState);
      if (state.modal === 'tailProcessing') {
        document.getElementById('modalTitle').textContent = state.id ? '编辑尾部处理' : '添加尾部处理';
        document.getElementById('tailProcessingId').value = state.id || '';
        document.getElementById('tailProcessingName').value = state.name || '';
        document.getElementById('tailProcessingPrice').value = state.price || '';
        document.getElementById('tailProcessingCurrency').value = state.currency || 'RMB';
        document.getElementById('tailProcessingDescription').value = state.description || '';
        tailProcessingModal.show();
      }
      sessionStorage.removeItem('tailProcessingModalState');
    }

    async function loadTailProcessings() {
      try {
        const response = await fetch('/api/tail-processings', { headers: getAuthHeaders() });
        if (response.ok) {
          const data = await response.json();
          tailProcessings = data.tailProcessings || [];
          renderTailProcessings(tailProcessings);
        }
      } catch (error) {
        console.error('Failed to load tail processings:', error);
      }
    }

    function filterTailProcessings() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filtered = tailProcessings.filter(t => 
        t.name.toLowerCase().includes(searchTerm) ||
        t.description.toLowerCase().includes(searchTerm)
      );
      renderTailProcessings(filtered);
    }

    function renderTailProcessings(data) {
      const tbody = document.getElementById('tailProcessingsTable');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-3">暂无尾部处理数据</td></tr>';
        return;
      }
      tbody.innerHTML = data.map((tailProcessing, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>${tailProcessing.name}</td>
          <td>¥${tailProcessing.price.toFixed(2)}</td>
          <td>${tailProcessing.currency}</td>
          <td>${tailProcessing.description || '-'}</td>
          <td>${formatDate(tailProcessing.updatedAt)}</td>
          <td>
            <button class="btn btn-sm btn-primary me-1" onclick="editTailProcessing(${tailProcessing.id})">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteTailProcessing(${tailProcessing.id}, '${tailProcessing.name}')">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      `).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = '添加尾部处理';
      document.getElementById('tailProcessingId').value = '';
      document.getElementById('tailProcessingName').value = '';
      document.getElementById('tailProcessingPrice').value = '';
      document.getElementById('tailProcessingCurrency').value = 'RMB';
      document.getElementById('tailProcessingDescription').value = '';
      tailProcessingModal.show();
    }

    function editTailProcessing(id) {
      const tailProcessing = tailProcessings.find(t => t.id === id);
      if (!tailProcessing) return;
      
      document.getElementById('modalTitle').textContent = '编辑尾部处理';
      document.getElementById('tailProcessingId').value = tailProcessing.id;
      document.getElementById('tailProcessingName').value = tailProcessing.name;
      document.getElementById('tailProcessingPrice').value = tailProcessing.price;
      document.getElementById('tailProcessingCurrency').value = tailProcessing.currency;
      document.getElementById('tailProcessingDescription').value = tailProcessing.description || '';
      tailProcessingModal.show();
    }

    async function saveTailProcessing() {
      const id = document.getElementById('tailProcessingId').value;
      const name = document.getElementById('tailProcessingName').value.trim();
      const price = parseFloat(document.getElementById('tailProcessingPrice').value);
      const currency = document.getElementById('tailProcessingCurrency').value;
      const description = document.getElementById('tailProcessingDescription').value.trim();

      if (!name || isNaN(price)) {
        alert('请填写完整信息');
        return;
      }

      try {
        const url = id ? `/api/tail-processings/${id}` : '/api/tail-processings';
        const method = id ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, price, currency, description })
        });

        if (response.ok) {
          tailProcessingModal.hide();
          loadTailProcessings();
        }
      } catch (error) {
        console.error('Failed to save tail processing:', error);
        alert('保存失败');
      }
    }

    function deleteTailProcessing(id, name) {
      if (!confirm(`确定要删除尾部处理 "${name}" 吗？`)) return;
      
      fetch(`/api/tail-processings/${id}`, { method: 'DELETE' })
        .then(response => {
          if (response.ok) {
            loadTailProcessings();
          }
        })
        .catch(error => {
          console.error('Failed to delete tail processing:', error);
          alert('删除失败');
        });
    }
  </script>
</body>
</html>
