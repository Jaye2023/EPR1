                <div class="col-md-4">
                  <label class="form-label">电线单价</label>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/modalStateManager.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const productId = new URLSearchParams(window.location.search).get('id') ||
                      window.location.pathname.split('/').filter(Boolean)[1];

    const isEdit = window.location.pathname.includes('/edit') ||
                   (productId && !isNaN(productId));

    async function initApp() {
      const authenticated = await Auth.init();
      if (!authenticated) return;
      
      if (isEdit && productId) {
        document.getElementById('pageTitle').textContent = '编辑产品 - 报价系统';
        document.getElementById('formTitle').textContent = '编辑产品';
        document.getElementById('submitBtn').innerHTML = '<i class="bi bi-check-circle me-2"></i>更新';
        await loadProduct(productId);
      }
      
      document.getElementById('wireSpec').addEventListener('change', function() {
        loadWireSpec(this.value);
      });

      document.getElementById('length').addEventListener('input', calculateCablePrice);
      document.getElementById('copperPrice').addEventListener('input', calculateCablePrice);

      initSidebarState();
      initEventListeners();
      initAutoParseListeners();
      initFormSubmitListener();
      
      await Promise.all([
        loadWireSpecs(),
        loadPlugs(),
        loadTailProcessings()
      ]);
    }
    
    initApp();

    async function loadWireSpec(spec) {
      if (!spec) return;
      try {
        const [specResponse, calcResponse] = await Promise.all([
          fetch(`/api/wire-specs/${encodeURIComponent(spec)}`, { headers: Auth.getHeaders() }),
          fetch(`/api/wire-specs/${encodeURIComponent(spec)}/calculate`, { headers: Auth.getHeaders() })
        ]);
        
        if (specResponse.ok) {
          const wireSpec = await specResponse.json();
          document.getElementById('copperPrice').value = (Math.round((wireSpec.copper || 0) * 100) / 100).toFixed(2);
          document.getElementById('materialPrice').value = (Math.round((wireSpec.material || 0) * 100) / 100).toFixed(2);
        }
        
        if (calcResponse.ok) {
          const calc = await calcResponse.json();
          const finalPrice = parseFloat(calc.finalPrice) || 0;
          document.getElementById('cablePrice').value = finalPrice.toFixed(2);
        }
        
        calculateCablePrice();
        calculateUnitPrice();
      } catch (error) {
        console.error('Failed to load wire spec:', error);
      }
    }

    function loadPlugPrice(plugName) {
      if (!plugName) {
        document.getElementById('plugPrice').value = '0.00';
        calculateUnitPrice();
        return;
      }
      const plug = plugsData.find(p => p.name === plugName);
      if (plug) {
        document.getElementById('plugPrice').value = (parseFloat(plug.price) || 0).toFixed(2);
      } else {
        document.getElementById('plugPrice').value = '0.00';
      }
      calculateUnitPrice();
    }

    function calculateCablePrice() {
      const cablePrice = parseFloat(document.getElementById('cablePrice').value) || 0;
      const length = parseFloat(document.getElementById('length').value) || 0;
      const wirePrice = cablePrice * length;
      console.log('calculateCablePrice: cablePrice=', cablePrice, 'length=', length, 'wirePrice=', wirePrice);
      document.getElementById('wirePrice').value = wirePrice.toFixed(2);
      calculateUnitPrice();
    }



    let plugsData = [];
    let tailProcessingsData = [];
    let dataLoaded = false;

    async function ensureDataLoaded() {
      console.log('ensureDataLoaded called, dataLoaded=', dataLoaded, 'plugsData.length=', plugsData.length);
      if (dataLoaded && plugsData.length > 0) return;
      await Promise.all([
        loadWireSpecs(),
        loadPlugs(),
        loadTailProcessings(),
        loadProcessCards(),
        loadCustomerItemNumbers()
      ]);
      dataLoaded = true;
      console.log('Data loading complete, plugsData.length=', plugsData.length);
    }

    async function loadPlugs() {
      try {
        const response = await fetch('/api/plugs', { headers: Auth.getHeaders() });
        if (response.ok) {
          const data = await response.json();
          plugsData = data.plugs || [];
          console.log('Plugs loaded:', plugsData.length, 'plugs');
          
          const select = document.getElementById('plugModel');
          plugsData.forEach(plug => {
            const option = document.createElement('option');
            option.value = plug.name;
            option.textContent = plug.name;
            select.appendChild(option);
          });
          
          return plugsData;
        }
      } catch (error) {
        console.error('Failed to load plugs:', error);
      }
      return [];
    }

    async function loadTailProcessings() {
      try {
        const response = await fetch('/api/tail-processings', { headers: Auth.getHeaders() });
        if (response.ok) {
          const data = await response.json();
          tailProcessingsData = data.tailProcessings || [];
          return tailProcessingsData;
        }
      } catch (error) {
        console.error('Failed to load tail processings:', error);
      }
      return [];
    }

    function initAutoParseListeners() {
      document.getElementById('autoParseBtn').addEventListener('click', autoParseDescription);

      document.getElementById('description').addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') {
          autoParseDescription();
        }
      });
    }

    async function autoParseDescription() {
      const description = document.getElementById('description').value;
      if (!description.trim()) {
        alert('请先输入产品描述');
        return;
      }

      try {
        await ensureDataLoaded();

        console.log('plugsData.length:', plugsData.length);
        console.log('tailProcessingsData.length:', tailProcessingsData.length);
        console.log('wireSpecs in localStorage:', JSON.parse(localStorage.getItem('wireSpecs') || '[]').length);

        if (plugsData.length === 0) {
          console.warn('警告：插头数据未加载，插头价格将无法自动识别');
        }

        const wireSpecsInStorage = JSON.parse(localStorage.getItem('wireSpecs') || '[]');
        if (wireSpecsInStorage.length === 0) {
          console.warn('警告：电线规格数据未加载，电线价格将无法自动识别');
        }

        const parsedData = parseDescriptionLocally(description);
        console.log('Parsed data:', parsedData);
        fillFormWithParsedData(parsedData);
      } catch (error) {
        console.error('Parse error:', error);
        alert('解析失败，请检查产品描述格式');
      }
    }

    function parseDescriptionLocally(description) {
      console.log('Parsing description:', description);
      const result = {
        plugModel: null,
        wireSpec: null,
        length: null,
        tailProcessings: [],
        color: null,
        conductor: null,
        plugPrice: 0,
        wirePrice: 0,
        tailProcessingPrice: 0,
        copperPrice: 0,
        materialPrice: 0
      };

      const plugMatch = description.match(/ML-\d{3}(?:\([^)]+\))?/);
      if (plugMatch) {
        result.plugModel = plugMatch[0].replace(/\([^)]+\)/, '').trim();
        console.log('Extracted plug model:', result.plugModel);
        const basePlugModel = result.plugModel;
        const plug = plugsData.find(p =>
          p.name === basePlugModel ||
          p.name.startsWith(basePlugModel + '(') ||
          basePlugModel.startsWith(p.name.replace(/\([^)]+\)/, ''))
        );
        console.log('Found plug:', plug);
        if (plug) {
          result.plugPrice = plug.price || 0;
        }
      }

      const wireMatch = description.match(/(H0[35][A-Z]+-[A-Z]\s*\d+\s*[Xx*]\s*\d+\.?\d*)/i);
      console.log('Wire match result:', wireMatch);
      if (!wireMatch) {
        const awgMatch = description.match(/([A-Z]+\s*\d+AWG[Xx\/][23]C)/i);
        console.log('AWG match result:', awgMatch);
        if (awgMatch) {
          result.wireSpec = awgMatch[1].replace(/\s+/g, '').replace('AWG', ' ').replace(/X/gi, '/');
        }
      } else {
        let wireSpecStr = wireMatch[1].replace(/\s+/g, ' ').trim();
        wireSpecStr = wireSpecStr.replace(/([\d])\s*[Xx]\s*([\d])/gi, '$1*$2');
        result.wireSpec = wireSpecStr;
      }
      console.log('Extracted wireSpec:', result.wireSpec);

      const wireSpecs = JSON.parse(localStorage.getItem('wireSpecs') || '[]');
      console.log('Wire specs from localStorage count:', wireSpecs.length);
      console.log('Looking for wireSpec:', result.wireSpec);
      if (result.wireSpec && wireSpecs.length > 0) {
        const foundWire = matchWireSpec(result.wireSpec, wireSpecs);
        console.log('Found wire spec:', foundWire);
        if (foundWire) {
          console.log('Copper price from wire spec:', foundWire.copper);
          result.copperPrice = foundWire.copper || 0;
          result.materialPrice = foundWire.material || 0;
          console.log('Set result.copperPrice to:', result.copperPrice);
        }
      } else {
        console.log('Wire specs not found in localStorage or wireSpec is null');
      }

      const lengthMatch = description.match(/总长\s*[=:]\s*([\d.]+)\s*米/);
      if (lengthMatch) {
        result.length = parseFloat(lengthMatch[1]);
      }

      const tailProcessingNames = tailProcessingsData.map(t => t.name);
      for (const tpName of tailProcessingNames) {
        if (description.includes(tpName)) {
          result.tailProcessings.push(tpName);
          const tp = tailProcessingsData.find(t => t.name === tpName);
          if (tp) {
            result.tailProcessingPrice += tp.price || 0;
          }
        }
      }
      
      if (description.includes('尾部脱皮') || description.includes('脱皮')) {
        const peeling = tailProcessingsData.find(t => t.name.includes('脱皮') || t.name.includes('剥皮'));
        if (peeling) {
          if (!result.tailProcessings.includes(peeling.name)) {
            result.tailProcessings.push(peeling.name);
            result.tailProcessingPrice += peeling.price || 0;
          }
        }
      }
      
      if (description.includes('半剥')) {
        const halfStrip = tailProcessingsData.find(t => t.name.includes('半剥'));
        if (halfStrip) {
          if (!result.tailProcessings.includes(halfStrip.name)) {
            result.tailProcessings.push(halfStrip.name);
            result.tailProcessingPrice += halfStrip.price || 0;
          }
        }
      }

      const colorMatch = description.match(/(黑色|白色|红色|蓝色|绿色|黄色|灰色|透明)/);
      if (colorMatch) {
        result.color = colorMatch[1];
      }

      const conductorMatch = description.match(/(普通导体|镀锡导体|无氧铜)/);
      if (conductorMatch) {
        result.conductor = conductorMatch[1];
      }

      console.log('Final parsed result:', result);
      return result;
    }

    function matchWireSpec(inputSpec, wireSpecs) {
      const normalizedInput = inputSpec.toLowerCase().replace(/\s+/g, '');

      const matchPatterns = [
        (spec) => spec.toLowerCase().replace(/\s+/g, '') === normalizedInput,
        (spec) => spec.toLowerCase().replace(/\s+/g, '').includes(normalizedInput),
        (spec) => normalizedInput.includes(spec.toLowerCase().replace(/\s+/g, '')),
        (spec) => {
          const specNoSpace = spec.toLowerCase().replace(/\s+/g, '');
          const inputNoSpace = normalizedInput;
          return specNoSpace.replace(/[x*]/g, '') === inputNoSpace.replace(/[x*]/g, '');
        },
        (spec) => {
          const specParts = spec.toLowerCase().split(/[\s*/xX]+/).filter(p => p);
          const inputParts = inputSpec.toLowerCase().split(/[\s*/xX]+/).filter(p => p);
          return specParts.length === inputParts.length &&
                 specParts.every((part, index) => inputParts[index] === part);
        }
      ];

      for (const pattern of matchPatterns) {
        const found = wireSpecs.find(w => pattern(w.spec));
        if (found) {
          return found;
        }
      }
      return null;
    }

    async function fillFormWithParsedData(parsedData) {
      console.log('Filling form with parsed data:', parsedData);
      if (parsedData.plugModel) {
        document.getElementById('item').value = parsedData.plugModel;
        document.getElementById('plugModel').value = parsedData.plugModel;
      }
      if (parsedData.plugPrice) {
        document.getElementById('plugPrice').value = parsedData.plugPrice;
        console.log('Set plugPrice to:', parsedData.plugPrice);
      }
      if (parsedData.wireSpec) {
        document.getElementById('wireSpec').value = parsedData.wireSpec;
        console.log('Set wireSpec to:', parsedData.wireSpec);
        await loadWireSpec(parsedData.wireSpec);
      }
      if (parsedData.length) {
        document.getElementById('length').value = parsedData.length;
        console.log('Set length to:', parsedData.length);
      }
      if (parsedData.copperPrice) {
        document.getElementById('copperPrice').value = Math.round(parsedData.copperPrice * 100) / 100;
        console.log('Set copperPrice to:', parsedData.copperPrice);
      } else {
        console.log('copperPrice is 0 or undefined, checking wire spec match...');
      }
      if (parsedData.materialPrice) {
        document.getElementById('materialPrice').value = Math.round(parsedData.materialPrice * 100) / 100;
      }
      if (parsedData.tailProcessings.length > 0) {
        const tailProcessingText = parsedData.tailProcessings.join('; ');
        document.getElementById('tailProcessing').value = tailProcessingText;
        loadTailProcessingPrice(tailProcessingText);
      }
      if (parsedData.tailProcessingPrice) {
        document.getElementById('tailProcessingPrice').value = parsedData.tailProcessingPrice;
      }
      if (parsedData.color) {
        console.log('Detected color:', parsedData.color);
      }
      if (parsedData.conductor) {
        console.log('Detected conductor:', parsedData.conductor);
      }
      console.log('Calling calculateCablePrice...');
      console.log('  copperPrice value before:', document.getElementById('copperPrice').value);
      console.log('  length value before:', document.getElementById('length').value);
      calculateCablePrice();
      console.log('  cablePrice value after:', document.getElementById('cablePrice').value);
      calculateUnitPrice();
    }

    function calculateUnitPrice() {
      const plugPrice = parseFloat(document.getElementById('plugPrice').value) || 0;
      const wirePrice = parseFloat(document.getElementById('wirePrice').value) || 0;
      const tailProcessingPrice = parseFloat(document.getElementById('tailProcessingPrice').value) || 0;
      const cableTiePrice = parseFloat(document.getElementById('cableTiePrice').value) || 0;
      const terminalSleevePrice = parseFloat(document.getElementById('terminalSleevePrice').value) || 0;
      const tailWirePrice = parseFloat(document.getElementById('tailWirePrice').value) || 0;
      const profitMargin = parseFloat(document.getElementById('profitMargin').value) || 0;

      const total = plugPrice + wirePrice + tailProcessingPrice + cableTiePrice + terminalSleevePrice + tailWirePrice + profitMargin;
      document.getElementById('unitPrice').value = total.toFixed(4);
    }

    function initEventListeners() {
      document.getElementById('plugPrice').addEventListener('input', calculateUnitPrice);
      document.getElementById('cablePrice').addEventListener('input', calculateCablePrice);
      document.getElementById('tailProcessingPrice').addEventListener('input', calculateUnitPrice);
      document.getElementById('cableTiePrice').addEventListener('input', calculateUnitPrice);
      document.getElementById('terminalSleevePrice').addEventListener('input', calculateUnitPrice);
      document.getElementById('tailWirePrice').addEventListener('input', calculateUnitPrice);
      document.getElementById('profitMargin').addEventListener('input', calculateUnitPrice);
      
      // 尾部处理自动匹配价格
      document.getElementById('tailProcessing').addEventListener('input', function() {
        loadTailProcessingPrice(this.value);
      });
    }
    
    function loadTailProcessingPrice(tailProcessingText) {
      if (!tailProcessingText) {
        document.getElementById('tailProcessingPrice').value = '0.00';
        calculateUnitPrice();
        return;
      }
      
      let totalPrice = 0;
      for (const tp of tailProcessingsData) {
        if (tailProcessingText.includes(tp.name)) {
          totalPrice += parseFloat(tp.price) || 0;
        }
      }
      
      document.getElementById('tailProcessingPrice').value = totalPrice.toFixed(2);
      calculateUnitPrice();
    }

    async function loadWireSpecs() {
      try {
        const response = await fetch('/api/wire-specs', { headers: Auth.getHeaders() });
        if (response.ok) {
          const data = await response.json();
          const select = document.getElementById('wireSpec');
          data.wireSpecs.forEach(spec => {
            const option = document.createElement('option');
            option.value = spec.spec;
            option.textContent = spec.spec;
            select.appendChild(option);
          });
          localStorage.setItem('wireSpecs', JSON.stringify(data.wireSpecs));
          console.log('Wire specs loaded:', data.wireSpecs.length, 'specs, stored in localStorage');
          return data.wireSpecs;
        }
      } catch (error) {
        console.error('Failed to load wire specs:', error);
      }
      return [];
    }

    async function loadProcessCards() {
      try {
        const response = await fetch('/api/process-cards', { headers: Auth.getHeaders() });
        if (response.ok) {
          const data = await response.json();
          const select = document.getElementById('processCard');
          data.processCards.forEach(card => {
            const option = document.createElement('option');
            option.value = card.code;
            option.textContent = `${card.code} - ${card.name}`;
            select.appendChild(option);
          });
          return data.processCards;
        }
      } catch (error) {
        console.error('Failed to load process cards:', error);
      }
      return [];
    }

    async function loadCustomerItemNumbers() {
      try {
        const response = await fetch('/api/customer-item-numbers', { headers: Auth.getHeaders() });
        if (response.ok) {
          const data = await response.json();
          const select = document.getElementById('customerItemNumber');
          data.customerItemNumbers.forEach(item => {
            const option = document.createElement('option');
            option.value = item.id;
            option.textContent = `${item.itemNumber} - ${item.description}`;
            select.appendChild(option);
          });
          return data.customerItemNumbers;
        }
      } catch (error) {
        console.error('Failed to load customer item numbers:', error);
      }
      return [];
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');

      sidebar.classList.toggle('collapsed');
      mainContent.classList.toggle('expanded');

      if (sidebar.classList.contains('collapsed')) {
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
        sessionStorage.setItem('sidebarCollapsed', 'true');
      } else {
        icon.classList.remove('bi-chevron-right');
        icon.classList.add('bi-chevron-left');
        sessionStorage.setItem('sidebarCollapsed', 'false');
      }
    }

    function initSidebarState() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      const isCollapsed = sessionStorage.getItem('sidebarCollapsed') === 'true';

      if (isCollapsed) {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
      }
    }

    async function loadProduct(id) {
      try {
        const response = await fetch(`/api/products/${id}`, { headers: Auth.getHeaders() });
        if (response.ok) {
          const p = await response.json();
          document.getElementById('productId').value = p.id;
          document.getElementById('itemNumber').value = p.itemNumber || '';
          document.getElementById('item').value = p.item || '';
          document.getElementById('description').value = p.description || '';
          document.getElementById('plugPrice').value = p.plugPrice || 0;
          document.getElementById('cablePrice').value = p.cablePrice || 0;
          document.getElementById('length').value = p.length || 0;
          document.getElementById('wireSpec').value = p.wireSpec || '';
          document.getElementById('wirePrice').value = p.wirePrice || 0;
          document.getElementById('unitPrice').value = p.unitPrice || 0;
          document.getElementById('tailProcessing').value = p.tailProcessing || '';
          document.getElementById('tailProcessingPrice').value = p.tailProcessingPrice || 0;
          document.getElementById('cableTie').value = p.cableTie || '';
          document.getElementById('cableTiePrice').value = p.cableTiePrice || 0;
          document.getElementById('terminalSleeve').value = p.terminalSleeve || '';
          document.getElementById('terminalSleevePrice').value = p.terminalSleevePrice || 0;
          document.getElementById('tailWire').value = p.tailWire || '';
          document.getElementById('tailWirePrice').value = p.tailWirePrice || 0;
          document.getElementById('processCard').value = p.processCard || '';
          document.getElementById('unit').value = p.unit || 'pcs';
          document.getElementById('currency').value = p.currency || 'RMB';
          document.getElementById('copperPrice').value = p.copperPrice || 0;
          document.getElementById('materialPrice').value = p.materialPrice || 0;
          document.getElementById('profitMargin').value = p.profitMargin || 0;
          document.getElementById('remarks').value = p.remarks || '';
          calculateCablePrice();
        }
      } catch (error) {
        console.error('Failed to load product:', error);
        alert('加载产品失败');
      }
    }

    function initFormSubmitListener() {
      document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
        itemNumber: parseInt(document.getElementById('itemNumber').value) || 0,
        item: document.getElementById('item').value,
        description: document.getElementById('description').value,
        plugPrice: parseFloat(document.getElementById('plugPrice').value) || 0,
        cablePrice: parseFloat(document.getElementById('cablePrice').value) || 0,
        length: parseFloat(document.getElementById('length').value) || 0,
        wireSpec: document.getElementById('wireSpec').value,
        wirePrice: parseFloat(document.getElementById('wirePrice').value) || 0,
        unitPrice: parseFloat(document.getElementById('unitPrice').value) || 0,
        tailProcessing: document.getElementById('tailProcessing').value,
        tailProcessingPrice: parseFloat(document.getElementById('tailProcessingPrice').value) || 0,
        cableTie: document.getElementById('cableTie').value,
        cableTiePrice: parseFloat(document.getElementById('cableTiePrice').value) || 0,
        terminalSleeve: document.getElementById('terminalSleeve').value,
        terminalSleevePrice: parseFloat(document.getElementById('terminalSleevePrice').value) || 0,
        tailWire: document.getElementById('tailWire').value,
        tailWirePrice: parseFloat(document.getElementById('tailWirePrice').value) || 0,
        processCard: document.getElementById('processCard').value,
        unit: document.getElementById('unit').value,
        currency: document.getElementById('currency').value,
        copperPrice: parseFloat(document.getElementById('copperPrice').value) || 0,
        materialPrice: parseFloat(document.getElementById('materialPrice').value) || 0,
        profitMargin: parseFloat(document.getElementById('profitMargin').value) || 0,
        remarks: document.getElementById('remarks').value
      };

      const id = document.getElementById('productId').value;
      const url = id ? `/api/products/${id}` : '/api/products';
      const method = id ? 'PUT' : 'POST';

      try {
        const response = await fetch(url, {
          method,
          headers: Auth.getHeaders(),
          body: JSON.stringify(data)
        });

        if (response.ok) {
          window.location.href = '/products';
        } else {
          const error = await response.json();
          alert('保存失败: ' + error.error);
        }
      } catch (error) {
        console.error('Failed to save:', error);
        alert('保存失败: ' + error.message);
      }
    });
    }

  </script>
