<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报价人管理 - 报价系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/sidebar.css">
  <style>
    body { background-color: #f8f9fa; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">
      <i class="bi bi-chevron-left" id="toggleIcon"></i>
    </button>
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="bi bi-calculator"></i></div>
      <div class="sidebar-title">报价系统</div>
      <div class="sidebar-subtitle">Baojia System</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">主菜单</div>
      <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i><span>仪表盘</span></a>
      <a class="nav-link" href="/products"><i class="bi bi-box-seam"></i><span>产品管理</span></a>
      <a class="nav-link" href="/quotes"><i class="bi bi-file-earmark-text"></i><span>报价单管理</span></a>
      <a class="nav-link" href="/customers"><i class="bi bi-people"></i><span>客户管理</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">基础数据</div>
      <a class="nav-link" href="/wire-specs"><i class="bi bi-diagram-3"></i><span>电线规格</span></a>
      <a class="nav-link" href="/plugs"><i class="bi bi-plug"></i><span>插头价格</span></a>
      <a class="nav-link" href="/tail-processings"><i class="bi bi-scissors"></i><span>尾部处理</span></a>
      <a class="nav-link" href="/process-cards"><i class="bi bi-file-image"></i><span>料号</span></a>
      <a class="nav-link" href="/customer-item-numbers"><i class="bi bi-tag"></i><span>客户料号</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">系统</div>
      <a class="nav-link active" href="/salespersons"><i class="bi bi-person-badge"></i><span>报价人管理</span></a>
      <a class="nav-link" href="/settings"><i class="bi bi-gear"></i><span>系统设置</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar"><i class="bi bi-person"></i></div>
        <div>
          <div class="user-name" id="sidebarUserName">管理员</div>
          <div class="user-role" id="sidebarUserRole">系统管理</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="p-4">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb bg-white px-4 py-2 rounded-lg shadow-sm">
          <li class="breadcrumb-item"><a href="/">首页</a></li>
          <li class="breadcrumb-item active">报价人管理</li>
        </ol>
      </nav>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">报价人管理</h2>
        <button class="btn btn-primary" onclick="showAddModal()"><i class="bi bi-plus-circle me-2"></i>添加报价人</button>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <div class="position-relative col-md-4">
            <i class="bi bi-search search-icon text-muted"></i>
            <input type="text" class="form-control pl-10" id="searchInput" placeholder="搜索报价人姓名..." onkeyup="if(event.key === 'Enter') loadSalespersons()">
          </div>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover">
            <thead class="bg-gray-50">
              <tr>
                <th>姓名</th>
                <th>邮箱</th>
                <th>电话</th>
                <th>角色</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="salespersonsTable"></tbody>
          </table>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between">
          <span id="paginationInfo">共 0 条记录</span>
          <nav id="pagination"></nav>
        </div>
      </div>

      <div class="modal fade" id="salespersonModal">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="modalTitle">添加报价人</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="salespersonId">
              <div class="mb-3">
                <label>姓名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" required>
              </div>
              <div class="mb-3">
                <label>邮箱 <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="mb-3">
                <label>电话</label>
                <input type="text" class="form-control" id="phone">
              </div>
              <div class="mb-3">
                <label>密码 <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password" required>
              </div>
              <div class="mb-3">
                <label>角色</label>
                <select class="form-select" id="role">
                  <option value="user">普通用户</option>
                  <option value="admin">管理员</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
              <button type="button" class="btn btn-primary" onclick="saveSalesperson()">保存</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let modal = null;

    function getAuthHeaders() { return Auth.getHeaders(); }

    async function loadSalespersons(page = 1) {
      const search = document.getElementById('searchInput').value;
      const res = await fetch(`/api/salespersons?page=${page}&search=${encodeURIComponent(search)}`, { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        renderSalespersons(data.salespersons);
        renderPagination(data.page, data.totalPages, data.total);
      }
    }

    function renderSalespersons(items) {
      const tbody = document.getElementById('salespersonsTable');
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(item => `
        <tr>
          <td>${item.name}</td>
          <td>${item.email}</td>
          <td>${item.phone || '-'}</td>
          <td>${item.role === 'admin' ? '管理员' : '普通用户'}</td>
          <td><span class="badge bg-success">启用</span></td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editSalesperson(${item.id})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteSalesperson(${item.id}, '${item.name}')"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    function renderPagination(current, totalPages, total) {
      document.getElementById('paginationInfo').textContent = `共 ${total} 条记录`;
      let html = '<ul class="pagination mb-0">';
      if (totalPages > 1) {
        html += `<li class="page-item ${current === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadSalespersons(${current - 1})">上一页</a></li>`;
        for (let i = 1; i <= totalPages; i++) {
          html += `<li class="page-item ${current === i ? 'active' : ''}"><a class="page-link" href="#" onclick="loadSalespersons(${i})">${i}</a></li>`;
        }
        html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadSalespersons(${current + 1})">下一页</a></li>`;
      }
      html += '</ul>';
      document.getElementById('pagination').innerHTML = html;
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = '添加报价人';
      document.getElementById('salespersonId').value = '';
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('password').value = '';
      document.getElementById('role').value = 'user';
      modal.show();
    }

    async function editSalesperson(id) {
      const res = await fetch(`/api/salespersons/${id}`, { headers: getAuthHeaders() });
      if (res.ok) {
        const item = await res.json();
        document.getElementById('modalTitle').textContent = '编辑报价人';
        document.getElementById('salespersonId').value = item.id;
        document.getElementById('name').value = item.name;
        document.getElementById('email').value = item.email;
        document.getElementById('phone').value = item.phone || '';
        document.getElementById('password').value = '';
        document.getElementById('role').value = item.role;
        modal.show();
      }
    }

    async function saveSalesperson() {
      const id = document.getElementById('salespersonId').value;
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };
      if (!data.name || !data.email) { alert('请填写必填项'); return; }
      const url = id ? `/api/salespersons/${id}` : '/api/salespersons';
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method, headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
        body: JSON.stringify(data)
      });
      if (res.ok) { modal.hide(); loadSalespersons(); }
    }

    async function deleteSalesperson(id, name) {
      if (!confirm(`确定删除 "${name}" 吗？`)) return;
      const res = await fetch(`/api/salespersons/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
      if (res.ok) loadSalespersons();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      sidebar.classList.toggle('collapsed');
      mainContent.classList.toggle('expanded');
      icon.classList.toggle('bi-chevron-left');
      icon.classList.toggle('bi-chevron-right');
      sessionStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed') ? 'true' : 'false');
    }

    function initSidebarState() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      if (sessionStorage.getItem('sidebarCollapsed') === 'true') {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const authenticated = await Auth.init();
      if (!authenticated) return;
      modal = new bootstrap.Modal(document.getElementById('salespersonModal'));
      initSidebarState();
      loadSalespersons();
    });
  </script>
</body>
</html>
