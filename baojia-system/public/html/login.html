<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 报价系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 30px;
      text-align: center;
      color: white;
    }
    .login-header .logo {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .login-header .logo i {
      font-size: 32px;
    }
    .login-header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .login-header p {
      font-size: 11px;
      opacity: 0.8;
      margin: 0;
    }
    .login-body {
      padding: 30px;
    }
    .form-floating {
      margin-bottom: 16px;
    }
    .form-floating .form-control {
      border-radius: 10px;
      border: 2px solid #e9ecef;
      padding-left: 44px;
      height: 50px;
    }
    .form-floating .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
    }
    .form-floating label {
      padding-left: 44px;
    }
    .form-floating .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #6c757d;
      z-index: 5;
    }
    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 11px;
      font-weight: 500;
      width: 100%;
      transition: all 0.3s ease;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-login:disabled {
      transform: none;
      box-shadow: none;
    }
    .alert {
      border-radius: 10px;
      border: none;
    }
    .default-account {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 20px;
      font-size: 11px;
      color: #6c757d;
    }
    .default-account strong {
      color: #495057;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <i class="bi bi-calculator"></i>
      </div>
      <h1>报价系统</h1>
      <p>Baojia System</p>
    </div>
    <div class="login-body">
      <div id="alertContainer"></div>
      <form id="loginForm">
        <div class="form-floating position-relative">
          <i class="bi bi-person input-icon"></i>
          <input type="text" class="form-control" id="username" placeholder="用户名" required autocomplete="username">
          <label for="username">用户名</label>
        </div>
        <div class="form-floating position-relative">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" class="form-control" id="password" placeholder="密码" required autocomplete="current-password">
          <label for="password">密码</label>
        </div>
        <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
          <span class="spinner-border spinner-border-sm d-none" id="loginSpinner"></span>
          <span id="loginText">登录</span>
        </button>
      </form>
      <div class="default-account">
        <i class="bi bi-info-circle me-1"></i>
        默认账户: <strong>admin</strong> / <strong>admin123</strong>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const loginSpinner = document.getElementById('loginSpinner');
      const loginText = document.getElementById('loginText');
      const alertContainer = document.getElementById('alertContainer');
      
      alertContainer.innerHTML = '';
      
      loginBtn.disabled = true;
      loginSpinner.classList.remove('d-none');
      loginText.textContent = '登录中...';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('lastUsername', username);
          
          alertContainer.innerHTML = `
            <div class="alert alert-success">
              <i class="bi bi-check-circle me-2"></i>登录成功，正在跳转...
            </div>
          `;
          
          setTimeout(() => {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
            window.location.href = redirect;
          }, 500);
        } else {
          throw new Error(data.error || '登录失败');
        }
      } catch (error) {
        alertContainer.innerHTML = `
          <div class="alert alert-danger">
            <i class="bi bi-exclamation-circle me-2"></i>${error.message}
          </div>
        `;
      } finally {
        loginBtn.disabled = false;
        loginSpinner.classList.add('d-none');
        loginText.textContent = '登录';
      }
    });
    
    document.addEventListener('DOMContentLoaded', () => {
      const savedUsername = localStorage.getItem('lastUsername');
      if (savedUsername) {
        document.getElementById('username').value = savedUsername;
      }

      const token = localStorage.getItem('token');
      if (token) {
        fetch('/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => {
          if (res.ok) {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
            window.location.href = redirect;
          }
        })
        .catch(() => {});
      }
    });
  </script>
</body>
</html>
