<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">新建报价单 - 报价系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
body { background-color: #f8f9fa; }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">
      <i class="bi bi-chevron-left" id="toggleIcon"></i>
    </button>

    <div class="sidebar-header">
      <div class="sidebar-logo">
        <i class="bi bi-calculator"></i>
      </div>
      <div class="sidebar-title">报价系统</div>
      <div class="sidebar-subtitle">Baojia System</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">主菜单</div>
      <a class="nav-link" href="/" title="仪表盘">
        <i class="bi bi-speedometer2"></i>
        <span>仪表盘</span>
      </a>
      <a class="nav-link" href="/products" title="产品管理">
        <i class="bi bi-box-seam"></i>
        <span>产品管理</span>
      </a>
      <a class="nav-link active" href="/quotes" title="报价单管理">
        <i class="bi bi-file-earmark-text"></i>
        <span>报价单管理</span>
      </a>
      <a class="nav-link" href="/customers" title="客户管理">
        <i class="bi bi-people"></i>
        <span>客户管理</span>
      </a>

      <div class="nav-divider"></div>
      <div class="nav-section-title">基础数据</div>

      <a class="nav-link" href="/wire-specs" title="电线规格">
        <i class="bi bi-diagram-3"></i>
        <span>电线规格</span>
      </a>
      <a class="nav-link" href="/plugs" title="插头价格">
        <i class="bi bi-plug"></i>
        <span>插头价格</span>
      </a>
      <a class="nav-link" href="/tail-processings" title="尾部处理">
        <i class="bi bi-scissors"></i>
        <span>尾部处理</span>
      </a>
      <a class="nav-link" href="/process-cards" title="料号">
        <i class="bi bi-file-image"></i>
        <span>料号</span>
      </a>
      <a class="nav-link" href="/customer-item-numbers" title="客户料号">
        <i class="bi bi-tag"></i>
        <span>客户料号</span>
      </a>

      <div class="nav-divider"></div>
      <div class="nav-section-title">系统</div>

      <a class="nav-link" href="/salespersons" title="报价人管理">
        <i class="bi bi-person-badge"></i>
        <span>报价人管理</span>
      </a>
      <a class="nav-link" href="/settings" title="系统设置">
        <i class="bi bi-gear"></i>
        <span>系统设置</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          <i class="bi bi-person"></i>
        </div>
        <div>
          <div class="user-name" id="sidebarUserName">管理员</div>
          <div class="user-role" id="sidebarUserRole">系统管理</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="p-4">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/">首页</a></li>
          <li class="breadcrumb-item"><a href="/quotes">报价单管理</a></li>
          <li class="breadcrumb-item active" aria-current="page" id="breadcrumbTitle">新建报价单</li>
        </ol>
      </nav>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="formTitle">新建报价单</h2>
          <a href="/quotes" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>返回列表</a>
        </div>

        <div class="card">
          <div class="card-body p-4">
            <form id="quoteForm">
              <input type="hidden" id="quoteId">

              <h5 class="mb-3">基本信息</h5>
              <div class="row mb-3">
                <div class="col-md-4">
                  <label class="form-label">报价单号</label>
                  <input type="text" class="form-control" id="quoteNumber" readonly placeholder="系统自动生成">
                </div>
                <div class="col-md-4">
                  <label class="form-label">报价日期</label>
                  <input type="date" class="form-control" id="quoteDate" value="">
                </div>
                <div class="col-md-4">
                  <label class="form-label">客户名称</label>
                  <select class="form-select" id="customerId" onchange="onCustomerChange()">
                    <option value="">请选择客户</option>
                  </select>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-4">
                  <label class="form-label">联系人</label>
                  <input type="text" class="form-control" id="contactPerson" readonly>
                </div>
                <div class="col-md-4">
                  <label class="form-label">报价人</label>
                  <select class="form-select" id="salespersonId">
                    <option value="">请选择报价人</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">状态</label>
                  <select class="form-select" id="status">
                    <option value="draft">草稿</option>
                    <option value="confirmed">已确认</option>
                    <option value="sent">已发送</option>
                    <option value="expired">已过期</option>
                  </select>
                </div>
              </div>

              <hr>

              <h5 class="mb-3">产品明细 <button type="button" class="btn btn-sm btn-primary ms-2" onclick="addProductRow()"><i class="bi bi-plus"></i> 添加产品</button></h5>
              <div id="itemsContainer">
                <div class="text-center text-muted py-3">点击"添加产品"按钮添加报价明细</div>
              </div>

              <hr>

              <h5 class="mb-3">条款信息</h5>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">付款方式</label>
                  <input type="text" class="form-control" id="paymentMethod" value="月结 60 天（以电汇或银行承兑汇票结清）">
                </div>
                <div class="col-md-6">
                  <label class="form-label">交货期限</label>
                  <input type="text" class="form-control" id="deliveryTerm" value="报价单双方确认后10-15工作天">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">交货地址</label>
                <textarea class="form-control" id="shippingAddress" rows="2"></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label">品质要求</label>
                <input type="text" class="form-control" id="qualityRequirement" value="产品质量无特殊备注要求以安规为准，环保符合ROHS、REACH、PAHS标准">
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">增值税</label>
                  <input type="text" class="form-control" id="taxRate" value="13%">
                </div>
                <div class="col-md-6">
                  <label class="form-label">货物交付</label>
                  <input type="text" class="form-control" id="shippingInfo" value="报价包含至贵司运费，货物交付至贵司地址：广东中山">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">报价有效期</label>
                <input type="text" class="form-control" id="validityTerm" value="本报价依据铜价 100001-102000元/吨 报出，若铜价或原材料波动剧烈且本报价单未能及时签回，报价单须重新签订">
              </div>

              <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="/quotes" class="btn btn-secondary">取消</a>
                <button type="button" class="btn btn-outline-primary" onclick="saveQuote('draft')">保存草稿</button>
                <button type="submit" class="btn btn-primary" id="submitBtn"><i class="bi bi-check-circle me-2"></i>保存并查看</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">选择产品</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <input type="text" class="form-control" id="productSearch" placeholder="搜索产品..." oninput="filterProducts()">
          </div>
          <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
            <table class="table table-hover table-sm">
              <thead class="sticky-top bg-white">
                <tr>
                  <th>项号</th>
                  <th>产品名称规格</th>
                  <th>单价</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="productsList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/modalStateManager.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let items = [];
    let allProducts = [];
    let allCustomers = [];
    let allSalespersons = [];
    let productModal = null;

    const quoteId = window.location.pathname.split('/').filter(Boolean)[1];
    const isEdit = window.location.pathname.includes('/edit') || (quoteId && !isNaN(quoteId));

    document.addEventListener('DOMContentLoaded', async () => {
      const authenticated = await Auth.init();
      if (!authenticated) return;

      productModal = new bootstrap.Modal(document.getElementById('productModal'));
      document.getElementById('quoteDate').value = new Date().toISOString().split('T')[0];
      loadAllProducts();
      loadCustomers();
      loadSalespersons();
      initSidebarState();

      if (isEdit && quoteId) {
        document.getElementById('pageTitle').textContent = '编辑报价单 - 报价系统';
        document.getElementById('formTitle').textContent = '编辑报价单';
        loadQuote(quoteId);
      }
    });

    async function loadCustomers() {
      try {
        const response = await fetch('/api/customers', { headers: Auth.getHeaders() });
        if (response.ok) {
          const data = await response.json();
          allCustomers = data.customers || [];
          const select = document.getElementById('customerId');
          allCustomers.forEach(customer => {
            const option = document.createElement('option');
            option.value = customer.id;
            option.textContent = customer.name;
            select.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Failed to load customers:', error);
      }
    }

    async function loadSalespersons() {
      try {
        const response = await fetch('/api/salespersons', { headers: Auth.getHeaders() });
        if (response.ok) {
          const data = await response.json();
          allSalespersons = data.salespersons || [];
          const select = document.getElementById('salespersonId');
          allSalespersons.forEach(salesperson => {
            const option = document.createElement('option');
            option.value = salesperson.id;
            option.textContent = salesperson.name;
            select.appendChild(option);
          });
          if (allSalespersons.length > 0) {
            document.getElementById('salespersonId').value = allSalespersons[0].id;
          }
        }
      } catch (error) {
        console.error('Failed to load salespersons:', error);
      }
    }

    function onCustomerChange() {
      const customerId = document.getElementById('customerId').value;
      if (!customerId) {
        document.getElementById('contactPerson').value = '';
        document.getElementById('paymentMethod').value = '';
        document.getElementById('shippingAddress').value = '';
        return;
      }
      const customer = allCustomers.find(c => c.id == customerId);
      if (customer) {
        document.getElementById('contactPerson').value = customer.contactPerson || '';
        if (customer.paymentMethod) {
          document.getElementById('paymentMethod').value = customer.paymentMethod;
        }
        if (customer.shippingAddress) {
          document.getElementById('shippingAddress').value = customer.shippingAddress;
          document.getElementById('shippingInfo').value = `报价包含至贵司运费，货物交付至贵司地址：${customer.shippingAddress}`;
        }
      }
    }

    async function loadAllProducts() {
      try {
        const response = await fetch('/api/products?pageSize=1000', { headers: Auth.getHeaders() });
        const data = await response.json();
        allProducts = data.products || [];
        renderProductsList(allProducts);
      } catch (error) {
        console.error('Failed to load products:', error);
      }
    }

    function renderProductsList(products) {
      const tbody = document.getElementById('productsList');
      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-3">暂无产品</td></tr>';
        return;
      }
      tbody.innerHTML = products.map(p => `
        <tr>
          <td>${p.item || '-'}</td>
          <td>${p.description || '-'}</td>
          <td>${p.unitPrice ? '¥' + p.unitPrice.toFixed(4) : '-'}</td>
          <td><button type="button" class="btn btn-sm btn-primary" onclick="selectProduct(${p.id})">选择</button></td>
        </tr>
      `).join('');
    }

    function filterProducts() {
      const search = document.getElementById('productSearch').value.toLowerCase();
      const filtered = allProducts.filter(p =>
        (p.item && p.item.toString().toLowerCase().includes(search)) ||
        (p.description && p.description.toLowerCase().includes(search))
      );
      renderProductsList(filtered);
    }

    function addProductRow(product = null) {
      productModal.show();
      if (!product) {
        currentEditIndex = null;
      }
    }

    let currentEditIndex = null;

    function selectProduct(productId) {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;

      if (currentEditIndex !== null) {
        items[currentEditIndex] = {
          productId: product.id,
          item: product.item,
          description: product.description,
          plugPrice: product.plugPrice || 0,
          cablePrice: product.cablePrice || 0,
          length: product.length || 0,
          unit: product.unit || 'pcs',
          unitPrice: product.unitPrice || 0,
          currency: product.currency || 'RMB',
          quantity: items[currentEditIndex].quantity || 1,
          totalPrice: (product.unitPrice || 0) * (items[currentEditIndex].quantity || 1)
        };
      } else {
        items.push({
          productId: product.id,
          item: product.item,
          description: product.description,
          plugPrice: product.plugPrice || 0,
          cablePrice: product.cablePrice || 0,
          length: product.length || 0,
          unit: product.unit || 'pcs',
          unitPrice: product.unitPrice || 0,
          currency: product.currency || 'RMB',
          quantity: 1,
          totalPrice: product.unitPrice || 0
        });
      }

      productModal.hide();
      currentEditIndex = null;
      renderItems();
    }

    function renderItems() {
      const container = document.getElementById('itemsContainer');
      if (items.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-3">点击"添加产品"按钮添加报价明细</div>';
        return;
      }

      container.innerHTML = items.map((item, index) => `
        <div class="item-row">
          <div class="row align-items-center">
            <div class="col-md-1">
              <strong>${index + 1}</strong>
            </div>
            <div class="col-md-4">
              <input type="text" class="form-control form-control-sm" value="${item.description || ''}" placeholder="产品描述" onchange="updateItem(${index}, 'description', this.value)">
            </div>
            <div class="col-md-2">
              <div class="input-group input-group-sm">
                <span class="input-group-text">数量</span>
                <input type="number" class="form-control" value="${item.quantity}" min="1" onchange="updateItem(${index}, 'quantity', this.value)">
              </div>
            </div>
            <div class="col-md-2">
              <div class="input-group input-group-sm">
                <span class="input-group-text">单价</span>
                <input type="number" step="0.0001" class="form-control" value="${item.unitPrice}" onchange="updateItem(${index}, 'unitPrice', this.value)">
              </div>
            </div>
            <div class="col-md-2">
              <strong>¥${(item.totalPrice || 0).toFixed(4)}</strong>
            </div>
            <div class="col-md-1">
              <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeItem(${index})"><i class="bi bi-trash"></i></button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function updateItem(index, field, value) {
      items[index][field] = parseFloat(value) || 0;
      if (field === 'quantity' || field === 'unitPrice') {
        items[index].totalPrice = items[index].quantity * items[index].unitPrice;
      }
      renderItems();
    }

    function removeItem(index) {
      items.splice(index, 1);
      renderItems();
    }

    async function loadQuote(id) {
      try {
        const response = await fetch(`/api/quotes/${id}`, { headers: Auth.getHeaders() });
        if (response.ok) {
          const quote = await response.json();
          document.getElementById('quoteId').value = quote.id;
          document.getElementById('quoteNumber').value = quote.quoteNumber || '';
          document.getElementById('quoteDate').value = quote.quoteDate || '';
          
          if (quote.customerId) {
            document.getElementById('customerId').value = quote.customerId;
            const customer = allCustomers.find(c => c.id == quote.customerId);
            if (customer) {
              document.getElementById('contactPerson').value = customer.contactPerson || '';
            }
          } else if (quote.customerName) {
            document.getElementById('customerId').value = '';
            const customer = allCustomers.find(c => c.name === quote.customerName);
            if (customer) {
              document.getElementById('customerId').value = customer.id;
              document.getElementById('contactPerson').value = customer.contactPerson || '';
            }
          }
          
          if (quote.salespersonId) {
            document.getElementById('salespersonId').value = quote.salespersonId;
          } else if (quote.salesperson) {
            const salesperson = allSalespersons.find(s => s.name === quote.salesperson);
            if (salesperson) {
              document.getElementById('salespersonId').value = salesperson.id;
            }
          }
          
          document.getElementById('status').value = quote.status || 'draft';
          document.getElementById('paymentMethod').value = quote.paymentMethod || '';
          document.getElementById('deliveryTerm').value = quote.deliveryTerm || '';
          document.getElementById('qualityRequirement').value = quote.qualityRequirement || '';
          document.getElementById('taxRate').value = quote.taxRate || '';
          document.getElementById('shippingInfo').value = quote.shippingInfo || '';
          document.getElementById('validityTerm').value = quote.validityTerm || '';

          if (quote.items && quote.items.length > 0) {
            items = quote.items.map(item => ({
              productId: item.productId,
              item: item.itemNumber,
              description: item.description,
              plugPrice: item.plugPrice || 0,
              cablePrice: item.cablePrice || 0,
              length: item.length || 0,
              unit: item.unit || 'pcs',
              unitPrice: item.unitPrice || 0,
              currency: item.currency || 'RMB',
              quantity: item.quantity || 1,
              totalPrice: item.totalPrice || 0
            }));
            renderItems();
          }
        }
      } catch (error) {
        console.error('Failed to load quote:', error);
        alert('加载报价单失败');
      }
    }

    async function saveQuote(status) {
      const customerId = document.getElementById('customerId').value;
      const salespersonId = document.getElementById('salespersonId').value;
      
      const customer = allCustomers.find(c => c.id == customerId);
      const salesperson = allSalespersons.find(s => s.id == salespersonId);

      const data = {
        quoteDate: document.getElementById('quoteDate').value,
        customerId: customerId ? parseInt(customerId) : null,
        customerName: customer ? customer.name : document.getElementById('customerId').options[document.getElementById('customerId').selectedIndex].text,
        contactPerson: document.getElementById('contactPerson').value,
        salespersonId: salespersonId ? parseInt(salespersonId) : null,
        salesperson: salesperson ? salesperson.name : '朱建云',
        status: status || document.getElementById('status').value,
        paymentMethod: document.getElementById('paymentMethod').value,
        deliveryTerm: document.getElementById('deliveryTerm').value,
        shippingAddress: document.getElementById('shippingAddress').value,
        qualityRequirement: document.getElementById('qualityRequirement').value,
        taxRate: document.getElementById('taxRate').value,
        shippingInfo: document.getElementById('shippingInfo').value,
        validityTerm: document.getElementById('validityTerm').value,
        items: items.map((item, index) => ({
          itemNumber: index + 1,
          description: item.description,
          plugPrice: item.plugPrice,
          cablePrice: item.cablePrice,
          length: item.length,
          unit: item.unit,
          unitPrice: item.unitPrice,
          currency: item.currency,
          quantity: item.quantity,
          totalPrice: item.totalPrice
        }))
      };

      const id = document.getElementById('quoteId').value;
      const url = id ? `/api/quotes/${id}` : '/api/quotes';
      const method = id ? 'PUT' : 'POST';

      try {
        const response = await fetch(url, {
          method,
          headers: { ...Auth.getHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          const quote = await response.json();
          window.location.href = `/quotes/${quote.id}`;
        } else {
          const error = await response.json();
          alert('保存失败: ' + error.error);
        }
      } catch (error) {
        console.error('Failed to save:', error);
        alert('保存失败: ' + error.message);
      }
    }

    document.getElementById('quoteForm').addEventListener('submit', (e) => {
      e.preventDefault();
      saveQuote();
    });

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');

      sidebar.classList.toggle('collapsed');
      mainContent.classList.toggle('expanded');

      if (sidebar.classList.contains('collapsed')) {
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
        sessionStorage.setItem('sidebarCollapsed', 'true');
      } else {
        icon.classList.remove('bi-chevron-right');
        icon.classList.add('bi-chevron-left');
        sessionStorage.setItem('sidebarCollapsed', 'false');
      }
    }

    function initSidebarState() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      const isCollapsed = sessionStorage.getItem('sidebarCollapsed') === 'true';

      if (isCollapsed) {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
      }
    }
  </script>
</body>
</html>
