<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>料号管理 - 报价系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/sidebar.css">
  <style>
    body { background-color: #f8f9fa; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">
      <i class="bi bi-chevron-left" id="toggleIcon"></i>
    </button>
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="bi bi-calculator"></i></div>
      <div class="sidebar-title">报价系统</div>
      <div class="sidebar-subtitle">Baojia System</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">主菜单</div>
      <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i><span>仪表盘</span></a>
      <a class="nav-link" href="/products"><i class="bi bi-box-seam"></i><span>产品管理</span></a>
      <a class="nav-link" href="/quotes"><i class="bi bi-file-earmark-text"></i><span>报价单管理</span></a>
      <a class="nav-link" href="/customers"><i class="bi bi-people"></i><span>客户管理</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">基础数据</div>
      <a class="nav-link" href="/wire-specs"><i class="bi bi-diagram-3"></i><span>电线规格</span></a>
      <a class="nav-link" href="/plugs"><i class="bi bi-plug"></i><span>插头价格</span></a>
      <a class="nav-link" href="/tail-processings"><i class="bi bi-scissors"></i><span>尾部处理</span></a>
      <a class="nav-link active" href="/process-cards"><i class="bi bi-file-image"></i><span>料号</span></a>
      <a class="nav-link" href="/customer-item-numbers"><i class="bi bi-tag"></i><span>客户料号</span></a>
      <div class="nav-divider"></div>
      <div class="nav-section-title">系统</div>
      <a class="nav-link" href="/salespersons"><i class="bi bi-person-badge"></i><span>报价人管理</span></a>
      <a class="nav-link" href="/settings"><i class="bi bi-gear"></i><span>系统设置</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar"><i class="bi bi-person"></i></div>
        <div>
          <div class="user-name" id="sidebarUserName">管理员</div>
          <div class="user-role" id="sidebarUserRole">系统管理</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="p-4">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb bg-white px-4 py-2 rounded-lg shadow-sm">
          <li class="breadcrumb-item"><a href="/">首页</a></li>
          <li class="breadcrumb-item active">料号管理</li>
        </ol>
      </nav>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">料号管理</h2>
        <button class="btn btn-primary" onclick="showAddModal()"><i class="bi bi-plus-circle me-2"></i>添加料号</button>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <div class="position-relative col-md-4">
            <i class="bi bi-search search-icon text-muted"></i>
            <input type="text" class="form-control pl-10" id="searchInput" placeholder="搜索料号..." onkeyup="if(event.key === 'Enter') loadProcessCards()">
          </div>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover">
            <thead class="bg-gray-50">
              <tr>
                <th>料号</th>
                <th>电线规格</th>
                <th>插头型号</th>
                <th>尾部处理</th>
                <th>单价</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="processCardsTable"></tbody>
          </table>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between">
          <span id="paginationInfo">共 0 条记录</span>
          <nav id="pagination"></nav>
        </div>
      </div>

      <div class="modal fade" id="processCardModal">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="modalTitle">添加料号</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="cardId">
              <div class="mb-3">
                <label>料号 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="itemNumber" required placeholder="如: WH-001">
              </div>
              <div class="mb-3">
                <label>电线规格</label>
                <select class="form-select" id="wireSpecId"></select>
              </div>
              <div class="mb-3">
                <label>插头型号</label>
                <select class="form-select" id="plugId"></select>
              </div>
              <div class="mb-3">
                <label>尾部处理</label>
                <select class="form-select" id="tailProcessingId"></select>
              </div>
              <div class="mb-3">
                <label>单价</label>
                <input type="number" class="form-control" id="price" step="0.01" min="0">
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
              <button type="button" class="btn btn-primary" onclick="saveProcessCard()">保存</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let modal = null;

    function getAuthHeaders() { return Auth.getHeaders(); }

    async function loadProcessCards(page = 1) {
      const search = document.getElementById('searchInput').value;
      const res = await fetch(`/api/process-cards?page=${page}&search=${encodeURIComponent(search)}`, { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        renderProcessCards(data.processCards);
        renderPagination(data.page, data.totalPages, data.total);
      }
    }

    function renderProcessCards(items) {
      const tbody = document.getElementById('processCardsTable');
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(item => `
        <tr>
          <td>${item.itemNumber}</td>
          <td>${item.wireSpec?.specification || '-'}</td>
          <td>${item.plug?.model || '-'}</td>
          <td>${item.tailProcessing?.name || '-'}</td>
          <td>${item.price ? item.price.toFixed(2) : '-'}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editProcessCard(${item.id})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteProcessCard(${item.id}, '${item.itemNumber}')"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    function renderPagination(current, totalPages, total) {
      document.getElementById('paginationInfo').textContent = `共 ${total} 条记录`;
      let html = '<ul class="pagination mb-0">';
      if (totalPages > 1) {
        html += `<li class="page-item ${current === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadProcessCards(${current - 1})">上一页</a></li>`;
        for (let i = 1; i <= totalPages; i++) {
          html += `<li class="page-item ${current === i ? 'active' : ''}"><a class="page-link" href="#" onclick="loadProcessCards(${i})">${i}</a></li>`;
        }
        html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadProcessCards(${current + 1})">下一页</a></li>`;
      }
      html += '</ul>';
      document.getElementById('pagination').innerHTML = html;
    }

    async function loadWireSpecs() {
      const res = await fetch('/api/wire-specs', { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        const select = document.getElementById('wireSpecId');
        select.innerHTML = '<option value="">请选择电线规格</option>' + 
          data.wireSpecs.map(s => `<option value="${s.id}">${s.specification}</option>`).join('');
      }
    }

    async function loadPlugs() {
      const res = await fetch('/api/plugs', { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        const select = document.getElementById('plugId');
        select.innerHTML = '<option value="">请选择插头型号</option>' + 
          data.plugs.map(p => `<option value="${p.id}">${p.model}</option>`).join('');
      }
    }

    async function loadTailProcessings() {
      const res = await fetch('/api/tail-processings', { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        const select = document.getElementById('tailProcessingId');
        select.innerHTML = '<option value="">请选择尾部处理</option>' + 
          data.tailProcessings.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
      }
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = '添加料号';
      document.getElementById('cardId').value = '';
      document.getElementById('itemNumber').value = '';
      document.getElementById('wireSpecId').value = '';
      document.getElementById('plugId').value = '';
      document.getElementById('tailProcessingId').value = '';
      document.getElementById('price').value = '';
      modal.show();
    }

    async function editProcessCard(id) {
      const res = await fetch(`/api/process-cards/${id}`, { headers: getAuthHeaders() });
      if (res.ok) {
        const item = await res.json();
        document.getElementById('modalTitle').textContent = '编辑料号';
        document.getElementById('cardId').value = item.id;
        document.getElementById('itemNumber').value = item.itemNumber;
        document.getElementById('wireSpecId').value = item.wireSpecId || '';
        document.getElementById('plugId').value = item.plugId || '';
        document.getElementById('tailProcessingId').value = item.tailProcessingId || '';
        document.getElementById('price').value = item.price || '';
        modal.show();
      }
    }

    async function saveProcessCard() {
      const id = document.getElementById('cardId').value;
      const data = {
        itemNumber: document.getElementById('itemNumber').value,
        wireSpecId: document.getElementById('wireSpecId').value || null,
        plugId: document.getElementById('plugId').value || null,
        tailProcessingId: document.getElementById('tailProcessingId').value || null,
        price: parseFloat(document.getElementById('price').value) || null
      };
      if (!data.itemNumber) {
        alert('请填写料号');
        return;
      }
      const url = id ? `/api/process-cards/${id}` : '/api/process-cards';
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method, headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        modal.hide();
        loadProcessCards();
      }
    }

    async function deleteProcessCard(id, itemNumber) {
      if (!confirm(`确定删除料号 "${itemNumber}" 吗？`)) return;
      const res = await fetch(`/api/process-cards/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
      if (res.ok) loadProcessCards();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      sidebar.classList.toggle('collapsed');
      mainContent.classList.toggle('expanded');
      icon.classList.toggle('bi-chevron-left');
      icon.classList.toggle('bi-chevron-right');
      sessionStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed') ? 'true' : 'false');
    }

    function initSidebarState() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const icon = document.getElementById('toggleIcon');
      if (sessionStorage.getItem('sidebarCollapsed') === 'true') {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
        icon.classList.remove('bi-chevron-left');
        icon.classList.add('bi-chevron-right');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const authenticated = await Auth.init();
      if (!authenticated) return;
      modal = new bootstrap.Modal(document.getElementById('processCardModal'));
      initSidebarState();
      await loadWireSpecs();
      await loadPlugs();
      await loadTailProcessings();
      loadProcessCards();
    });
  </script>
</body>
</html>
